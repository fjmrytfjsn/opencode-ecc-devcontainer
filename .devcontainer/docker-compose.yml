services:
  opencode-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      # 🚀 ビルド最適化設定
      args:
        - BUILDKIT_INLINE_CACHE=1
      target: final
      # 並列ビルド有効化
      platforms:
        - linux/amd64
    container_name: opencode-ecc-dev
    hostname: opencode-dev

    # 特権モード（Tailscale用）
    privileged: true

    # ネットワーク設定
    network_mode: host

    # 環境変数
    environment:
      - NODE_ENV=development
      - TAILSCALE_HOSTNAME=opencode-dev
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:-}
      - OPENCODE_HOST=0.0.0.0
      - OPENCODE_PORT=4095
      - OPENCHAMBER_HOST=0.0.0.0
      - OPENCHAMBER_PORT=3000
      - ECC_PROFILE=developer

    # ボリューム
    volumes:
      - ../:/workspace:cached
      - opencode-data:/home/vscode/.opencode
      - tailscale-state:/var/lib/tailscale
      - tailscale-run:/run/tailscale
      - /var/run/docker.sock:/var/run/docker-host.sock

    # ポート（host network使用時は不要だが明示）
    ports:
      - "3000:3000" # OpenChamber
      - "4095:4095" # OpenCode CLI
      - "8080:8080" # Development

    # 開発用設定
    stdin_open: true
    tty: true

    # ヘルスチェック
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  opencode-data:
    driver: local
  tailscale-state:
    driver: local
  tailscale-run:
    driver: local
